<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강우 기반 비점오염 수질 모니터링 출동 의사결정 대시보드</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <h1>💧 강우 기반 비점오염 수질 모니터링 출동 의사결정 시스템</h1>
        <div class="status-indicator">
            <span class="pulse"></span> <span>Backend System Active</span>
        </div>
    </header>

    <main class="dashboard-container">
        <!-- 1. 지도 영역 -->
        <section class="map-section">
            <div class="panel-header"><h2>지도 모니터링 (클릭하여 지점 선택)</h2></div>
            <div id="map"></div>
        </section>

        <!-- 2. 의사결정 영역 -->
        <section class="decision-section">
            <div class="panel-header"><h2>출동 판단 결과</h2></div>
            
            <div class="decision-card" id="decisionCard">
                <div class="decision-status" id="decisionStatus">-</div>
                <div class="decision-score">합의도/신뢰도: <span id="decisionScore">-</span>%</div>
                <div class="decision-reason" id="decisionReason">지도에서 모니터링 지점을 클릭해주세요.</div>
            </div>

            <div class="info-grid">
                <div class="info-box">
                    <h3>📍 선택 지점</h3>
                    <p id="selectedCoord">-</p>
                </div>
                <div class="info-box">
                    <h3>📡 실시간 레이더</h3>
                    <p id="radarStatus">-</p>
                </div>
                <div class="info-box">
                    <h3>🌧️ 과거 누적 강우 (24h)</h3>
                    <p id="pastRainfall">- mm</p>
                </div>
                <div class="info-box">
                    <h3>🔮 향후 예측 강우 (3h)</h3>
                    <p id="futureRainfall">- mm</p>
                </div>
            </div>
            
            <div class="models-comparison">
                <h3>모델 기반 평가 상세 (합의도 중심)</h3>
                <ul id="modelDetailsList">
                    <li>대기 중...</li>
                </ul>
            </div>
        </section>

        <!-- 3. 차트 영역 -->
        <section class="chart-section">
            <div class="panel-header"><h2>시간별 강수 분석 (관측 및 예측 모델 비교)</h2></div>
            <div class="chart-container">
                <canvas id="rainfallChart"></canvas>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
